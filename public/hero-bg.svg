<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="45%" stop-color="#0e0c0a"/>
      <stop offset="100%" stop-color="#1c2214"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="38%" r="45%">
      <stop offset="0%" stop-color="#c8ff3d" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#c8ff3d" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#c8ff3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8ff3d" stop-opacity="0"/>
      <stop offset="35%" stop-color="#c8ff3d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c8ff3d" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <!-- Film frame blocks -->
  <g opacity="0.35">
    <rect x="980" y="160" width="520" height="300" fill="#2a241c"/>
    <rect x="1180" y="520" width="420" height="240" fill="#221e18"/>
    <rect x="860" y="480" width="280" height="360" fill="#2e281f"/>
  </g>
  <g opacity="0.22" stroke="#f2ebe3" stroke-width="2" fill="none">
    <rect x="1000" y="180" width="480" height="260"/>
    <rect x="1200" y="540" width="380" height="200"/>
    <rect x="880" y="500" width="240" height="320"/>
  </g>
  <!-- Timeline -->
  <rect x="120" y="820" width="1680" height="2" fill="#f2ebe3" opacity="0.12"/>
  <rect x="120" y="812" width="520" height="18" fill="url(#bar)"/>
  <rect x="700" y="812" width="180" height="18" fill="#f2ebe3" opacity="0.18"/>
  <rect x="920" y="812" width="320" height="18" fill="#c8ff3d" opacity="0.28"/>
  <g fill="#f2ebe3" opacity="0.2">
    <rect x="120" y="800" width="3" height="42"/>
    <rect x="420" y="800" width="3" height="42"/>
    <rect x="700" y="800" width="3" height="42"/>
    <rect x="920" y="800" width="3" height="42"/>
    <rect x="1240" y="800" width="3" height="42"/>
    <rect x="1600" y="800" width="3" height="42"/>
  </g>
</svg>
